services:
  operator-control-plane:
    build:
      context: '${OPERATOR_CONTROL_PLANE_APP_DIR:-../Epic Commerce Platform/apps/operator-control-plane}'
    restart: unless-stopped
    depends_on:
      - 'mysql'
      - 'marketplace-orchestrator'
    environment:
      OPERATOR_CONTROL_PLANE_PORT: '${OPERATOR_CONTROL_PLANE_PORT:-8095}'
      OPERATOR_CONTROL_PLANE_ENVIRONMENT: '${OPERATOR_CONTROL_PLANE_ENVIRONMENT:-development}'
      OPERATOR_CONTROL_PLANE_DEFAULT_TENANT: '${OPERATOR_CONTROL_PLANE_DEFAULT_TENANT:-default}'
      OPERATOR_CONTROL_PLANE_PUBLIC_BASE_URL: '${OPERATOR_CONTROL_PLANE_PUBLIC_BASE_URL:-http://localhost:8095}'
      OPERATOR_CONTROL_PLANE_CATALOG_PUBLIC_URL: '${OPERATOR_CONTROL_PLANE_CATALOG_PUBLIC_URL:-http://localhost:8080}'
      OPERATOR_CONTROL_PLANE_DAM_PUBLIC_URL: '${OPERATOR_CONTROL_PLANE_DAM_PUBLIC_URL:-http://localhost:8081}'
      OPERATOR_CONTROL_PLANE_MARKETPLACE_PUBLIC_URL: '${OPERATOR_CONTROL_PLANE_MARKETPLACE_PUBLIC_URL:-http://localhost:8090/dashboard}'
      OPERATOR_CONTROL_PLANE_EPIC_AI_PUBLIC_URL: '${OPERATOR_CONTROL_PLANE_EPIC_AI_PUBLIC_URL:-http://localhost:3005}'
      OPERATOR_CONTROL_PLANE_DB_HOST: '${OPERATOR_CONTROL_PLANE_DB_HOST:-mysql}'
      OPERATOR_CONTROL_PLANE_DB_PORT: '${OPERATOR_CONTROL_PLANE_DB_PORT:-3306}'
      OPERATOR_CONTROL_PLANE_DB_USER: '${OPERATOR_CONTROL_PLANE_DB_USER:-akeneo_pim}'
      OPERATOR_CONTROL_PLANE_DB_PASSWORD: '${OPERATOR_CONTROL_PLANE_DB_PASSWORD:-akeneo_pim}'
      OPERATOR_CONTROL_PLANE_DB_NAME: '${OPERATOR_CONTROL_PLANE_DB_NAME:-akeneo_pim}'
      OPERATOR_CONTROL_PLANE_DB_TABLE_PREFIX: '${OPERATOR_CONTROL_PLANE_DB_TABLE_PREFIX:-operator_control_plane_}'
      OPERATOR_CONTROL_PLANE_DB_CREATE_IF_MISSING: '${OPERATOR_CONTROL_PLANE_DB_CREATE_IF_MISSING:-false}'
      OPERATOR_CONTROL_PLANE_AKENEO_BASE_URL: '${OPERATOR_CONTROL_PLANE_AKENEO_BASE_URL:-http://httpd}'
      OPERATOR_CONTROL_PLANE_AKENEO_TOKEN: '${OPERATOR_CONTROL_PLANE_AKENEO_TOKEN:-}'
      OPERATOR_CONTROL_PLANE_MARKETPLACE_BASE_URL: '${OPERATOR_CONTROL_PLANE_MARKETPLACE_BASE_URL:-http://marketplace-orchestrator:8090}'
      OPERATOR_CONTROL_PLANE_DAM_BASE_URL: '${OPERATOR_CONTROL_PLANE_DAM_BASE_URL:-http://resourcespace}'
      OPERATOR_CONTROL_PLANE_EPIC_AI_BASE_URL: '${OPERATOR_CONTROL_PLANE_EPIC_AI_BASE_URL:-http://host.docker.internal:3005}'
      OPERATOR_CONTROL_PLANE_PASSWORD_RESET_BASE_URL: '${OPERATOR_CONTROL_PLANE_PASSWORD_RESET_BASE_URL:-http://localhost:8095}'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '127.0.0.1:${DOCKER_PORT_OPERATOR_CONTROL_PLANE:-8095}:8095'
    networks:
      - 'pim'

networks:
  pim:
