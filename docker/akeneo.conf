<VirtualHost *:80>
    ServerName akeneo.dev
    ProxyPreserveHost On

    ProxyPass "/control-plane/" "http://operator-control-plane:8095/"
    ProxyPassReverse "/control-plane/" "http://operator-control-plane:8095/"

    ProxyPass "/market/" "http://marketplace-orchestrator:8090/"
    ProxyPassReverse "/market/" "http://marketplace-orchestrator:8090/"

    ProxyPass "/assets/" "http://resourcespace/"
    ProxyPassReverse "/assets/" "http://resourcespace/"
    ProxyPassReverseCookiePath "/" "/assets/"

    DocumentRoot /srv/pim/public
    <Directory /srv/pim/public>
        AllowOverride None
        Require all granted

        Options -MultiViews
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        SetEnv APP_ENV ${APP_ENV}
        RewriteRule ^(.*)$ index.php [QSA,L]
    </Directory>

    <Directory /srv/pim>
        Options FollowSymlinks
    </Directory>

    <Directory /srv/pim/public/bundles>
        RewriteEngine Off
    </Directory>

    ErrorLog /var/log/akeneo_error.log
    LogLevel warn
    CustomLog /var/log/akeneo_access.log combined
</VirtualHost>
